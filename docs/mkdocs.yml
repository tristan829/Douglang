site_name: Douglang Documentation
docs_dir: docs
site_dir: docs_site
theme:
  name: mkdocs
  color_mode: auto
  user_color_mode_toggle: true
  highlight_js: true
  hljs_languages:
    - doug
extra_javascript:
  - syntax_highlighting.js
markdown_extensions:
  - pymdownx.inlinehilite:
      css_class: 'language-douglang hljs'
nav:
  - 'hey_doug.md'
  - 'variables.md'
  - 'control_flow.md'